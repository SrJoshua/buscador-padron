<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padron | Mario Pineda - Opcion 7</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

    <header>

        <img src="img/banner.jpg" class="banner" alt="Mario Pineda">

    </header>

    <section class="card">

        <h1>Padron</h1>

        <p class="subtitulo">
            Consulte su local de votación ingresando su número de cédula.
        </p>

        <div class="busqueda">

            <input
                type="text"
                inputmode="numeric"
                id="cedula"
                placeholder="Ingrese su número de cédula">

            <button id="buscar">

                Buscar

            </button>

        </div>

        <div id="resultado"></div>

    </section>

</div>

<footer>

    Mario Pineda • Concejal del Pueblo • Lista 7 - Opción 7

</footer>

<script src="script.js"></script>

</body>
</html>
