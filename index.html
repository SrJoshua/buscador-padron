<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buscador de Planillas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="contenedor">

        <img src="img/banner.jpg" alt="Mario Pineda" class="banner">

        <div class="contenido">

            <h1>🔎 Buscador de Planillas</h1>

            <p class="descripcion">
                Consulte su local de votación ingresando su número de cédula.
            </p>

            <div class="busqueda">

                <input
                    type="number"
                    id="cedula"
                    placeholder="Ingrese su número de cédula">

                <button id="buscar">
                    Buscar
                </button>

            </div>

            <div id="resultado"></div>

        </div>

        <footer>

            <strong>Mario Pineda - Concejal del Pueblo</strong>

            <br>

            Lista 7 • Opción 7

        </footer>

    </div>

    <script src="script.js"></script>

</body>

</html>
